# Netlify Configuration for KmedTour
# https://docs.netlify.com/configure-builds/file-based-configuration/
# @netlify/plugin-nextjs handles publish dir, SSR routing, and functions automatically.

[build]
  command = "pnpm build"
  environment = { NODE_VERSION = "20" }

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"

[context.production]
  command = "pnpm build"

  [context.production.environment]
    NODE_ENV = "production"

[context.deploy-preview]
  command = "pnpm build"

  [context.deploy-preview.environment]
    NODE_ENV = "production"

[context.branch-deploy]
  command = "pnpm build"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache static assets aggressively
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# Next.js plugin handles SSR, API routes, ISR, and image optimization
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Scheduled function: process notification queue every 5 minutes.
# Defined in netlify/functions/process-notifications.ts using file-based config.
# Requires CRON_SECRET and NEXT_PUBLIC_APP_URL env vars in Netlify dashboard.
